<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Zed Cars</title>

  <link rel="stylesheet" href="style.css" />

  <!-- Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

  <!-- GSAP -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>

  <!-- Lenis -->
  <script src="https://cdn.jsdelivr.net/npm/@studio-freight/lenis@1.0.6/bundled/lenis.min.js"></script>
</head>
<body>

<!-- Loader -->
<div class="loader">
  <h1>Zed Cars</h1>
</div>

<!-- Cursor -->
<div class="cursor"></div>

<!-- Navbar -->
<header class="navbar">
  <div class="logo">Zed Cars</div>
  <nav>
    <a href="#">Home</a>
    <a href="#">Inventory</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
  </nav>
</header>

<!-- Hero -->
<section class="hero">
  <img src="images/hero.png" alt="">
  <div class="hero-content">
    <h1>Premium Used Cars</h1>
    <p>Drive excellence with Zed Cars</p>
    <button class="magnetic">Browse Inventory</button>
  </div>
</section>

<!-- Inventory -->
<section class="inventory">
  <h2>Featured Cars</h2>
  <div class="grid">
    <div class="card">
      <img src="images/car1.webp">
      <h3>BMW X5</h3>
    </div>
    <div class="card">
      <img src="images/car2.webp">
      <h3>Mercedes C-Class</h3>
    </div>
    <div class="card">
      <img src="images/car3.webp">
      <h3>Audi Q7</h3>
    </div>
  </div>
</section>

<!-- Services -->
<section class="services">
  <h2>Our Services</h2>
  <div class="grid">
    <div class="service">Financing</div>
    <div class="service">Trade-In</div>
    <div class="service">Inspection</div>
  </div>
</section>

<!-- CTA -->
<section class="cta">
  <h2>Find Your Dream Car</h2>
  <button class="magnetic">Contact Us</button>
</section>

<!-- Footer -->
<footer>
  <p>© 2026 Zed Cars. All rights reserved.</p>
</footer>

<script src="app.js"></script>
</body>
</html>
